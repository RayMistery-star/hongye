<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消防设备点检终端</title>
    <style>
        body { margin: 0; padding: 0; background-color: #F3F4F6; font-family: -apple-system, sans-serif; }
        .header { background-color: #0F172A; color: white; padding: 30px 20px 20px; border-radius: 0 0 20px 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 22px; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; color: #94A3B8; }
        
        .form-container { background: white; margin: -20px 20px 20px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); position: relative; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #374151; font-weight: 600; margin-bottom: 8px; }
        
        input[type="text"], select, textarea { width: 100%; box-sizing: border-box; padding: 14px; border: 1px solid #D1D5DB; border-radius: 10px; font-size: 16px; background-color: #F9FAFB; outline: none; transition: border-color 0.2s; -webkit-appearance: none; font-family: inherit; }
        input:focus, select:focus, textarea:focus { border-color: #3B82F6; background-color: #FFFFFF; }
        
        /* 视觉上弱化预设信息，强调不可编辑 */
        .readonly-info { background-color: #F3F4F6; padding: 14px; border-radius: 10px; color: #4B5563; font-weight: 500; border: 1px dashed #D1D5DB; }
        textarea { resize: vertical; min-height: 80px; }
        
        .submit-btn { width: 100%; background-color: #2563EB; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background-color 0.2s; }
        .submit-btn:disabled { background-color: #9CA3AF; cursor: not-allowed; }
        .divider { height: 1px; background-color: #E5E7EB; margin: 25px 0; }
        .error-text { color: #EF4444 !important; }
    </style>
</head>
<body>

    <div class="header">
        <h1>消防设施点检</h1>
        <p>数据测试通道</p>
    </div>

    <div class="form-container">
        <div class="form-group">
            <label>当前校验设备</label>
            <div class="readonly-info" id="displayInfo">信息读取中...</div>
            <input type="hidden" id="nfcId" value="">
        </div>

        <div class="divider"></div>

        <div class="form-group">
            <label>当前点检状态 <span class="error-text">*</span></label>
            <select id="status">
                <option value="正常">✅ 正常</option>
                <option value="异常">❌ 异常</option>
            </select>
        </div>

        <div class="form-group">
            <label>备注 (选填)</label>
            <textarea id="remark" placeholder="如有异常请简要说明..."></textarea>
        </div>

        <div class="form-group">
            <label>点检人员 <span class="error-text">*</span></label>
            <select id="inspector">
                <option value="" disabled selected>请选择测试人员</option>
                <option value="张三">张三</option>
                <option value="李四">李四</option>
            </select>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="submitData()">提交点检</button>
    </div>

    <script>
        // --- 系统防错机制：强制校验 URL 挂载参数 ---
        let isValidRequest = false;

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const nfcValue = urlParams.get('nfc');
            const nameValue = urlParams.get('name') || '未知设备';
            
            if (nfcValue && nfcValue.trim() !== '') {
                document.getElementById('nfcId').value = nfcValue.trim();
                document.getElementById('displayInfo').innerHTML = `
                    <strong>${decodeURIComponent(nameValue)}</strong> <br>
                    <span style="font-size: 12px; color: #9CA3AF;">追踪标识: ${nfcValue.trim()}</span>
                `;
                isValidRequest = true;
            } else {
                document.getElementById('displayInfo').innerHTML = "<span class='error-text'>无效标签：未能获取到匹配标识，禁止操作。</span>";
            }
        };

        function submitData() {
            if (!isValidRequest) {
                alert("流程拦截：无法识别该设备，请确认 NFC 标签是否有效。");
                return;
            }

            const inspector = document.getElementById('inspector').value;
            if (!inspector) {
                alert("流程要求：请选择测试人员。");
                return;
            }

            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerText;
            btn.innerText = '发送中...';
            btn.disabled = true;

            // ⚠️ 替换为你的真实 Webhook 链接
            const webhookUrl = "https://api.mingdao.com/workflow/hooks/YOUR_WEBHOOK_URL";

            const payload = {
                "nfcId": document.getElementById('nfcId').value,
                "status": document.getElementById('status').value,
                "remark": document.getElementById('remark').value,
                "inspector": inspector
            };

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(response => {
                if(response.ok) {
                    btn.innerText = '同步成功';
                    btn.style.backgroundColor = '#10B981';
                    alert("测试验证通过！");
                } else { throw new Error('网络异常'); }
            }).catch(error => {
                alert('系统异常，请重试。');
                btn.innerText = originalText;
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
