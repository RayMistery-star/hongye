<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>消防设备点检 (V2测试版)</title>
    <style>
        /* 1. 模拟底层深色遮罩背景 */
        body { margin: 0; padding: 0; background-color: rgba(0, 0, 0, 0.6); height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        
        /* 2. 模拟支付宝/Apple的底部优雅抽屉 */
        .bottom-sheet { background-color: #FFFFFF; border-radius: 24px 24px 0 0; padding: 30px 20px 40px 20px; box-shadow: 0 -10px 40px rgba(0,0,0,0.15); transform: translateY(100%); animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        /* 抽屉滑出的动画 */
        @keyframes slideUp { to { transform: translateY(0); } }
        
        /* 3. 卡片内部的视觉排版 */
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .icon-box { width: 50px; height: 50px; background-color: #E0E7FF; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-right: 15px; }
        .title { font-size: 20px; font-weight: 600; color: #111827; margin: 0; }
        .subtitle { font-size: 14px; color: #6B7280; margin-top: 4px; }
        
        /* 4. 消除二次确认的终极武器：巨大的物理点击按钮 */
        .action-btn { background-color: #3B82F6; color: white; border: none; border-radius: 14px; width: 100%; padding: 16px 0; font-size: 17px; font-weight: 600; text-align: center; display: block; text-decoration: none; margin-top: 30px; transition: background-color 0.2s; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .action-btn:active { background-color: #2563EB; transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="bottom-sheet">
        <div class="header">
            <div class="icon-box">🧯</div>
            <div>
                <h1 class="title">消防设备点检系统</h1>
                <div class="subtitle" id="deviceInfo">当前锚点：测试验证通道</div>
            </div>
        </div>
        
        <p style="color: #4B5563; font-size: 15px; line-height: 1.5; margin: 0;">
            此为 V2 终极测试引擎。<br>请点击下方按钮，体验零拦截直通。
        </p>

        <a href="https://applink.dingtalk.com/page/link?url=http%3A%2F%2F192.168.128.145%2Fxt" class="action-btn" id="jumpBtn">一键验证并打开明道云</a>
    </div>

</body>
</html>
